<!DOCTYPE html>
<html>
<head>
    <title>CircuitMind AI</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 60px;
        }

        h1 {
            color: #22c55e;
        }

        textarea {
            width: 350px;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 25px;
            background: #22c55e;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background: #16a34a;
        }

        #result {
            margin-top: 25px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>

<body>

<h1>⚡ CircuitMind AI</h1>
<p>Smart Circuit Troubleshooter</p>

<textarea id="problem" placeholder="Describe your circuit issue..."></textarea>
<br><br>

<button onclick="diagnose()">Diagnose</button>

<div id="result"></div>

<script>
function diagnose() {
    fetch("/diagnose", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            problem: document.getElementById("problem").value
        })
    })
    .then(res => res.json())
    .then(data => {
        let output = "<h2>" + data.diagnosis + "</h2>";

        output += "<h3>Causes:</h3><ul>";
        data.causes.forEach(c => {
            output += "<li>" + c + "</li>";
        });
        output += "</ul>";

        output += "<h3>Solution:</h3><p>" + data.solution + "</p>";

        document.getElementById("result").innerHTML = output;
    });
}
</script>

</body>
</html>
